<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1024, initial-scale=1" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 1024px;
        height: 500px;
        margin: 0;
        overflow: hidden;
        background: #f5f7fa;
        color: #15202b;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }
      .screen {
        position: relative;
        width: 1024px;
        height: 500px;
        padding: 118px 78px 84px;
        background:
          radial-gradient(circle at 82% 12%, rgba(31, 138, 112, 0.14), transparent 28%),
          linear-gradient(180deg, #f7fafc 0%, #eef4f1 100%);
      }
      .status {
        position: absolute;
        top: 28px;
        left: 78px;
        right: 78px;
        display: flex;
        justify-content: space-between;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .status-icons {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }
      .battery {
        position: relative;
        display: inline-block;
        width: 30px;
        height: 16px;
        border: 3px solid #15202b;
        border-radius: 5px;
      }
      .battery::before {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 2px;
        background: #15202b;
      }
      .battery::after {
        content: "";
        position: absolute;
        right: -7px;
        top: 4px;
        width: 4px;
        height: 6px;
        border-radius: 0 3px 3px 0;
        background: #15202b;
      }
      .brand {
        color: #1f8a70;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 0;
      }
      .headline {
        margin: 16px 0 14px;
        max-width: 820px;
        font-size: 82px;
        line-height: 0.98;
        font-weight: 950;
        letter-spacing: 0;
      }
      .subtitle {
        max-width: 760px;
        color: #475467;
        font-size: 34px;
        line-height: 1.22;
        font-weight: 650;
      }
      .coin-wrap {
        display: flex;
        justify-content: center;
        margin: 92px 0 42px;
      }
      .coin {
        position: relative;
        display: grid;
        place-items: center;
        width: 530px;
        height: 530px;
        border-radius: 50%;
        overflow: hidden;
        background:
          radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.85), transparent 24%),
          linear-gradient(140deg, #f5d169 0%, #bd7e21 52%, #8d5d18 100%);
        border: 18px solid #8b651c;
        box-shadow: 0 34px 70px rgba(16, 24, 40, 0.24);
      }
      .coin::before {
        content: "";
        position: absolute;
        inset: 48px;
        border-radius: 50%;
        border: 18px solid rgba(255, 255, 255, 0.32);
      }
      .coin::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.38), transparent 42%, rgba(54, 36, 10, 0.22));
      }
      .coin-label {
        position: relative;
        z-index: 1;
        max-width: 74%;
        text-align: center;
        font-size: 82px;
        line-height: 0.96;
        font-weight: 950;
        color: rgba(21, 32, 43, 0.82);
      }
      .result {
        text-align: center;
        font-size: 52px;
        font-weight: 930;
      }
      .feedback {
        margin: 10px auto 0;
        text-align: center;
        color: #1f8a70;
        font-size: 28px;
        font-weight: 850;
      }
      .button {
        margin: 44px auto 36px;
        width: 600px;
        border-radius: 34px;
        background: #15202b;
        color: white;
        padding: 31px 32px;
        text-align: center;
        font-size: 38px;
        font-weight: 930;
        box-shadow: 0 18px 46px rgba(21, 32, 43, 0.22);
      }
      .segments {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin: 0 0 34px;
      }
      .segment {
        min-height: 86px;
        border: 3px solid #cfd8e3;
        border-radius: 26px;
        background: #ffffff;
        padding: 24px;
        text-align: center;
        font-size: 30px;
        font-weight: 850;
      }
      .segment.active {
        background: #eaf7f2;
        border-color: #1f8a70;
        color: #1f8a70;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
      }
      .card {
        min-height: 188px;
        border: 2px solid #d9e1ea;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        padding: 30px;
      }
      .label {
        color: #344054;
        font-size: 27px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .value {
        margin-top: 18px;
        color: #15202b;
        font-size: 68px;
        font-weight: 950;
      }
      .detail {
        color: #1f8a70;
        font-size: 27px;
        font-weight: 900;
      }
      .history {
        margin-top: 32px;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }
      .pill {
        border-radius: 999px;
        background: #ffffff;
        border: 2px solid #d9e1ea;
        padding: 17px 22px;
        font-size: 25px;
        font-weight: 850;
      }
      .modal {
        margin: 90px auto 0;
        width: 930px;
        border-radius: 30px;
        background: #ffffff;
        padding: 58px 54px;
        box-shadow: 0 28px 90px rgba(16, 24, 40, 0.22);
      }
      .modal-title {
        font-size: 54px;
        font-weight: 950;
        margin-bottom: 38px;
      }
      .input {
        border: 3px solid #d0d8e4;
        border-radius: 22px;
        background: #f8fafc;
        padding: 28px 30px;
        margin-bottom: 24px;
        font-size: 34px;
        font-weight: 850;
      }
      .row {
        display: grid;
        grid-template-columns: 136px 1fr;
        gap: 28px;
        align-items: center;
        border: 2px solid #e0e7ef;
        border-radius: 22px;
        padding: 22px;
        margin-bottom: 22px;
        background: #f8fafc;
      }
      .avatar {
        display: grid;
        place-items: center;
        width: 116px;
        height: 116px;
        border-radius: 58px;
        background: linear-gradient(145deg, #f4c95d, #c98824);
        font-size: 38px;
        font-weight: 950;
      }
      .row-title {
        font-size: 35px;
        font-weight: 950;
      }
      .row-actions {
        display: flex;
        gap: 18px;
        margin-top: 14px;
      }
      .mini-button {
        border: 2px solid #cfd8e3;
        border-radius: 20px;
        background: #ffffff;
        padding: 18px 24px;
        font-size: 27px;
        font-weight: 900;
      }
      .privacy-card {
        margin-top: 48px;
        border-radius: 26px;
        background: #ffffff;
        border: 2px solid #d9e1ea;
        padding: 42px;
      }
      .privacy-card h2 {
        margin: 0 0 18px;
        font-size: 45px;
      }
      .privacy-card p {
        margin: 0 0 16px;
        color: #475467;
        font-size: 30px;
        line-height: 1.3;
        font-weight: 650;
      }
    </style>
  </head>
